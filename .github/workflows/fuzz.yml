name: fuzz

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly, Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: 'Per-harness fuzz duration (seconds; total runtime ≈ 3 × duration + ~5 min setup, must fit timeout-minutes below)'
        default: '120'

permissions:
  contents: read

jobs:
  atheris:
    name: Atheris coverage-guided fuzz
    runs-on: ubuntu-22.04
    # Three harnesses run sequentially at $DURATION each plus dependency
    # install and corpus staging. 60 min comfortably fits the default 120s
    # and a manual dispatch up to ~900s per harness.
    timeout-minutes: 60
    env:
      PARSER_LINEAGE_ANALYZER_NO_EXT: '1'
      DURATION: ${{ github.event.inputs.duration || '120' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.10'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      # Atheris 3.x requires dis.Positions (Python 3.11+); pin to 2.x for the
      # 3.10 runner.
      - run: python -m pip install 'atheris<3'
      # libFuzzer treats positional corpus directories as read-write — it
      # writes new "interesting" inputs back to the dir. Copy fixtures into
      # a working dir so the atheris run does not mutate checked-in tests.
      - name: Stage seed corpus
        run: |
          mkdir -p fuzz/corpus_parse_code fuzz/corpus_analyzer
          cp tests/fixtures/test_corpus/baseline/*.cbn fuzz/corpus_parse_code/
          cp tests/fixtures/test_corpus/baseline/*.cbn fuzz/corpus_analyzer/
      - name: Fuzz parse_code
        run: |
          mkdir -p fuzz/findings_parse_code
          python fuzz/fuzz_parse_code.py \
            -max_total_time=${DURATION} \
            -artifact_prefix=fuzz/findings_parse_code/ \
            fuzz/corpus_parse_code
      - name: Fuzz parse_config
        run: |
          mkdir -p fuzz/findings_parse_config
          python fuzz/fuzz_parse_config.py \
            -max_total_time=${DURATION} \
            -artifact_prefix=fuzz/findings_parse_config/
      - name: Fuzz analyzer
        run: |
          mkdir -p fuzz/findings_analyzer
          python fuzz/fuzz_analyzer.py \
            -max_total_time=${DURATION} \
            -artifact_prefix=fuzz/findings_analyzer/ \
            fuzz/corpus_analyzer
      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: atheris-crashes
          path: fuzz/findings_*/
          if-no-files-found: ignore
          retention-days: 30

  atheris_native:
    name: Atheris fuzz (native extensions enabled)
    runs-on: ubuntu-22.04
    # Mirrors the pure-Python `atheris` job above but leaves the Cython
    # extensions (_scanner_ext, _config_fast_ext, _dedupe_ext, _template_ext,
    # _branch_merge_ext) enabled so the analyzer's native code paths actually
    # execute under the fuzzer. Runs on a separate runner in parallel, so
    # wall-clock time is not extended.
    #
    # NOTE: this is "exercise" coverage, not libFuzzer-instrumented coverage.
    # Atheris feeds libFuzzer Python-bytecode edge counts only; the C
    # extensions are loaded as plain shared objects without
    # `-fsanitize=fuzzer-no-link` instrumentation, so libFuzzer's input
    # mutation is steered by Python-side coverage alone. The job still
    # catches crashes, segfaults, and asserts that originate inside native
    # code, which is the gap the security review flagged. True
    # native-code-coverage-guided fuzzing would require a Clang rebuild of
    # the extensions and an LD_PRELOAD of Atheris's libFuzzer (see
    # https://github.com/google/atheris/blob/master/native_extension_fuzzing.md);
    # leaving that for a follow-up.
    timeout-minutes: 60
    env:
      DURATION: ${{ github.event.inputs.duration || '120' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.10'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      # Atheris 3.x requires dis.Positions (Python 3.11+); pin to 2.x for the
      # 3.10 runner.
      - run: python -m pip install 'atheris<3'
      # Fail loudly if the Cython build silently no-op'd (toolchain regression,
      # missing Cython, etc.) — without this guard the job would still pass
      # while running pure-Python code, looking identical to the `atheris`
      # job and hiding the very regression this job exists to catch.
      - name: Verify native extensions are loadable
        run: |
          python - <<'PY'
          import importlib, sys
          required = [
              "parser_lineage_analyzer._native._scanner_ext",
              "parser_lineage_analyzer._native._config_fast_ext",
              "parser_lineage_analyzer._native._dedupe_ext",
              "parser_lineage_analyzer._native._template_ext",
              "parser_lineage_analyzer._native._branch_merge_ext",
          ]
          missing = []
          for name in required:
              try:
                  importlib.import_module(name)
              except ImportError as exc:
                  missing.append(f"{name}: {exc}")
          if missing:
              sys.exit("native extensions missing (atheris_native job would silently regress to pure-Python): " + "; ".join(missing))
          PY
      # libFuzzer treats positional corpus directories as read-write — it
      # writes new "interesting" inputs back to the dir. Copy fixtures into
      # a working dir so the atheris run does not mutate checked-in tests.
      - name: Stage seed corpus
        run: |
          mkdir -p fuzz/corpus_parse_code_native fuzz/corpus_analyzer_native
          cp tests/fixtures/test_corpus/baseline/*.cbn fuzz/corpus_parse_code_native/
          cp tests/fixtures/test_corpus/baseline/*.cbn fuzz/corpus_analyzer_native/
      - name: Fuzz parse_code (native)
        run: |
          mkdir -p fuzz/findings_parse_code_native
          python fuzz/fuzz_parse_code.py \
            -max_total_time=${DURATION} \
            -artifact_prefix=fuzz/findings_parse_code_native/ \
            fuzz/corpus_parse_code_native
      - name: Fuzz parse_config (native)
        run: |
          mkdir -p fuzz/findings_parse_config_native
          python fuzz/fuzz_parse_config.py \
            -max_total_time=${DURATION} \
            -artifact_prefix=fuzz/findings_parse_config_native/
      - name: Fuzz analyzer (native)
        run: |
          mkdir -p fuzz/findings_analyzer_native
          python fuzz/fuzz_analyzer.py \
            -max_total_time=${DURATION} \
            -artifact_prefix=fuzz/findings_analyzer_native/ \
            fuzz/corpus_analyzer_native
      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: atheris-native-crashes
          path: fuzz/findings_*_native/
          if-no-files-found: ignore
          retention-days: 30
